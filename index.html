<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeypR Academy – Business Track</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --biz: #059669;
    --biz-dark: #047857;
    --biz2: #10b981;
    --gold: #f59e0b;
    --gold2: #fbbf24;
    --navy: #0f1923;
    --purple: #7c3aed;
    --red: #dc2626;
    --sky: #0ea5e9;
    --bg: #0a1208;
    --card-bg: #111a0f;
    --text: #f0f0f0;
    --muted: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #050d03 0%, #0d1f09 50%, #050d03 100%);
    border-bottom: 3px solid var(--biz);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(5,150,105,0.25);
  }

  .logo { display: flex; align-items: center; gap: 14px; }

  .biz-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--biz), var(--gold));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 20px rgba(5,150,105,0.5);
    animation: pulse-green 2.5s ease-in-out infinite;
  }

  @keyframes pulse-green {
    0%,100% { box-shadow: 0 0 20px rgba(5,150,105,0.5); }
    50% { box-shadow: 0 0 40px rgba(5,150,105,0.8), 0 0 60px rgba(245,158,11,0.3); }
  }

  .logo-text h1 {
    font-family: 'Righteous', cursive;
    font-size: 1.5rem;
    background: linear-gradient(90deg, var(--biz2), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .logo-text p {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .xp-bar-wrap { flex: 1; max-width: 340px; min-width: 180px; }

  .xp-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.76rem;
    font-weight: 800;
    color: var(--gold2);
    margin-bottom: 5px;
  }

  .xp-track {
    height: 13px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid rgba(5,150,105,0.3);
  }

  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--biz), var(--gold2));
    border-radius: 99px;
    transition: width 0.6s ease;
    width: 0%;
  }

  /* ── DASHBOARD ── */
  #dashboard { padding: 28px 20px; max-width: 1100px; margin: 0 auto; }

  .welcome-banner {
    text-align: center;
    padding: 32px 20px 20px;
    animation: fadeInDown 0.7s ease;
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-banner h2 {
    font-family: 'Righteous', cursive;
    font-size: 2.2rem;
    background: linear-gradient(90deg, var(--biz2), var(--gold2), var(--biz2));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  .welcome-banner p {
    color: var(--muted);
    font-size: 0.98rem;
    margin-top: 8px;
    font-weight: 600;
  }

  .section-divider {
    text-align: center;
    margin: 44px 0 24px;
    position: relative;
  }

  .section-divider::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--biz), transparent);
  }

  .section-divider span {
    position: relative;
    background: var(--bg);
    padding: 0 20px;
    font-family: 'Righteous', cursive;
    font-size: 1.1rem;
    color: var(--biz2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
    gap: 18px;
    margin-top: 10px;
  }

  .module-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 22px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.5s ease both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .module-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent, var(--biz));
    opacity: 0.06;
    transition: opacity 0.3s;
  }

  .module-card:hover { transform: translateY(-6px); border-color: var(--accent, var(--biz)); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .module-card:hover::before { opacity: 0.13; }

  .card-emoji { font-size: 2.2rem; margin-bottom: 8px; display: block; }
  .card-num { font-size: 0.68rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent, var(--biz)); margin-bottom: 4px; }
  .card-title { font-family: 'Righteous', cursive; font-size: 1.2rem; color: #fff; margin-bottom: 5px; line-height: 1.2; }
  .card-desc { font-size: 0.81rem; color: var(--muted); line-height: 1.5; font-weight: 600; }
  .card-xp { margin-top: 12px; display: inline-block; background: rgba(255,255,255,0.06); border-radius: 99px; padding: 3px 11px; font-size: 0.73rem; font-weight: 800; color: var(--gold2); }
  .card-progress { margin-top: 9px; height: 5px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
  .card-progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent, var(--biz)), var(--gold2)); transition: width 0.5s ease; }
  .card-badge { position: absolute; top: 14px; right: 14px; font-size: 1.3rem; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 14px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #0d1a0b;
    border-radius: 22px;
    width: 100%;
    max-width: 800px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 2px solid rgba(5,150,105,0.35);
    box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 60px rgba(5,150,105,0.1);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.93) translateY(18px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .modal-header-icon { font-size: 1.9rem; }

  .modal-header h2 {
    font-family: 'Righteous', cursive;
    font-size: 1.3rem;
    color: #fff;
    flex: 1;
  }

  .close-btn {
    background: rgba(255,255,255,0.09);
    border: none;
    color: #fff;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .close-btn:hover { background: rgba(255,255,255,0.18); }

  .modal-body { display: flex; flex: 1; overflow: hidden; }

  .lesson-nav {
    width: 210px;
    flex-shrink: 0;
    border-right: 2px solid rgba(255,255,255,0.05);
    overflow-y: auto;
    padding: 10px 7px;
  }

  .lesson-tab {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 9px 11px;
    border-radius: 9px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 3px;
    transition: all 0.2s;
    line-height: 1.3;
  }

  .lesson-tab:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .lesson-tab.active { background: rgba(5,150,105,0.15); color: var(--biz2); }
  .lesson-tab.done { color: var(--gold2); }
  .lesson-tab.done::after { content: ' ✓'; }

  .lesson-content { flex: 1; overflow-y: auto; padding: 22px; }

  .lesson-panel h3 {
    font-family: 'Righteous', cursive;
    font-size: 1.25rem;
    color: var(--biz2);
    margin: 18px 0 7px;
  }

  .lesson-panel h3:first-child { margin-top: 0; }

  .lesson-panel p {
    font-size: 0.89rem;
    line-height: 1.7;
    color: #ccc;
    margin-bottom: 11px;
    font-weight: 600;
  }

  .info-box {
    background: rgba(5,150,105,0.1);
    border-left: 4px solid var(--biz);
    border-radius: 0 11px 11px 0;
    padding: 13px 15px;
    margin: 13px 0;
    font-size: 0.87rem;
    color: #86efac;
    font-weight: 700;
    line-height: 1.6;
  }

  .fun-fact {
    background: rgba(245,158,11,0.08);
    border: 2px dashed rgba(245,158,11,0.3);
    border-radius: 13px;
    padding: 13px 15px;
    margin: 13px 0;
    font-size: 0.87rem;
    color: #fde68a;
    font-weight: 700;
    line-height: 1.6;
  }

  .fun-fact::before { content: '💡 Real World: '; color: var(--gold2); }

  .vocab-box {
    background: rgba(124,58,237,0.1);
    border: 2px solid rgba(124,58,237,0.3);
    border-radius: 13px;
    padding: 13px 15px;
    margin: 13px 0;
  }

  .vocab-box .vocab-title {
    font-family: 'Righteous', cursive;
    color: #c4b5fd;
    font-size: 0.88rem;
    margin-bottom: 7px;
  }

  .vocab-box p { font-size: 0.84rem; color: #c4b5fd; margin-bottom: 5px; }
  .vocab-box strong { color: #ede9fe; }

  .challenge-box {
    background: rgba(245,158,11,0.07);
    border: 2px solid rgba(245,158,11,0.25);
    border-radius: 13px;
    padding: 13px 15px;
    margin: 13px 0;
  }

  .challenge-box .challenge-title {
    font-family: 'Righteous', cursive;
    color: var(--gold2);
    font-size: 0.88rem;
    margin-bottom: 7px;
  }

  .challenge-box p { font-size: 0.84rem; color: #fde68a; margin-bottom: 5px; font-weight: 600; }

  /* ── QUIZ ── */
  .quiz-block {
    background: rgba(255,255,255,0.03);
    border-radius: 15px;
    padding: 18px;
    margin: 18px 0;
    border: 2px solid rgba(5,150,105,0.2);
  }

  .quiz-block h3 { font-family: 'Righteous', cursive; font-size: 1rem; color: #fff; margin-bottom: 13px; }

  .quiz-options { display: flex; flex-direction: column; gap: 7px; }

  .quiz-opt {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.09);
    border-radius: 9px;
    padding: 11px 15px;
    color: #ddd;
    font-family: 'Nunito', sans-serif;
    font-size: 0.87rem;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .quiz-opt:hover:not(:disabled) { background: rgba(5,150,105,0.15); border-color: var(--biz); color: #fff; }
  .quiz-opt.correct { background: rgba(5,150,105,0.2); border-color: var(--biz); color: #86efac; }
  .quiz-opt.wrong { background: rgba(220,38,38,0.12); border-color: var(--red); color: #fca5a5; }

  .quiz-feedback {
    display: none;
    margin-top: 11px;
    padding: 11px 13px;
    border-radius: 9px;
    font-size: 0.87rem;
    font-weight: 700;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(5,150,105,0.13); color: #86efac; }
  .quiz-feedback.bad { background: rgba(220,38,38,0.1); color: #fca5a5; }

  /* ── PROMPT PRACTICE ── */
  .prompt-practice {
    background: rgba(255,255,255,0.02);
    border: 2px solid rgba(245,158,11,0.22);
    border-radius: 15px;
    padding: 18px;
    margin: 18px 0;
  }

  .prompt-practice h3 { font-family: 'Righteous', cursive; font-size: 1rem; color: var(--gold2); margin-bottom: 7px; }
  .prompt-practice p { font-size: 0.86rem; color: #bbb; margin-bottom: 9px; }

  .prompt-input-wrap { display: flex; gap: 7px; margin-top: 9px; }

  .prompt-textarea {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 11px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 0.87rem;
    font-weight: 600;
    padding: 9px 13px;
    resize: none;
    height: 88px;
    transition: border-color 0.2s;
  }

  .prompt-textarea:focus { outline: none; border-color: var(--biz); }

  .send-btn {
    background: linear-gradient(135deg, var(--biz), var(--gold2));
    border: none;
    border-radius: 11px;
    color: #052e16;
    font-size: 1.2rem;
    width: 46px; height: 46px;
    cursor: pointer;
    font-weight: 900;
    transition: transform 0.2s;
    align-self: flex-end;
    display: flex; align-items: center; justify-content: center;
  }

  .send-btn:hover { transform: scale(1.08); }

  .ai-response-wrap { margin-top: 11px; display: none; }
  .ai-response-wrap.show { display: block; }

  .ai-response {
    background: rgba(0,0,0,0.35);
    border-radius: 11px;
    padding: 13px;
    font-size: 0.85rem;
    color: #ddd;
    line-height: 1.6;
    font-weight: 600;
    border-left: 3px solid var(--biz);
  }

  .prompt-score { margin-top: 7px; font-size: 0.81rem; font-weight: 800; color: var(--gold2); text-align: right; }

  /* ── BUTTONS ── */
  .complete-btn {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 15px;
    background: linear-gradient(135deg, var(--biz), var(--gold2));
    color: #052e16;
    border: none;
    border-radius: 13px;
    font-family: 'Righteous', cursive;
    font-size: 1.05rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(5,150,105,0.35);
  }

  .complete-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(5,150,105,0.5); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 22px; right: 22px;
    background: linear-gradient(135deg, #0d1a0b, #052e16);
    border: 2px solid var(--biz);
    border-radius: 15px;
    padding: 13px 18px;
    display: flex;
    align-items: center;
    gap: 11px;
    font-size: 0.9rem;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-icon { font-size: 1.5rem; flex-shrink: 0; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(5,150,105,0.3); border-radius: 99px; }

  @media (max-width: 600px) {
    .modal-body { flex-direction: column; }
    .lesson-nav { width: 100%; border-right: none; border-bottom: 2px solid rgba(255,255,255,0.05); max-height: 110px; display: flex; flex-wrap: nowrap; overflow-x: auto; padding: 7px; gap: 5px; }
    .lesson-tab { white-space: nowrap; width: auto; }
    .welcome-banner h2 { font-size: 1.6rem; }
  }

  .money-rain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
  .money-drop { position: absolute; top: -40px; font-size: 1.3rem; animation: fall linear forwards; }
  @keyframes fall { to { top: 110vh; opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="biz-icon">💼</div>
    <div class="logo-text">
      <h1>KeypR Academy</h1>
      <p>Business Track</p>
    </div>
  </div>
  <div class="xp-bar-wrap">
    <div class="xp-label">
      <span>💰 Profit XP</span>
      <span id="xpCount">0 / 1800</span>
    </div>
    <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
  </div>
</header>

<div id="dashboard">
  <div class="welcome-banner">
    <h2>💼 Business Academy</h2>
    <p>Learn how money works, how businesses are built, and how to think like an entrepreneur — starting right now! 🚀</p>
  </div>

  <div class="section-divider"><span>🌱 Level 1 — Money Fundamentals</span></div>
  <div class="module-grid" id="gridL1"></div>

  <div class="section-divider"><span>⚙️ Level 2 — Business Basics</span></div>
  <div class="module-grid" id="gridL2"></div>

  <div class="section-divider"><span>🚀 Level 3 — Entrepreneur Mindset</span></div>
  <div class="module-grid" id="gridL3"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-header-icon" id="modalIcon"></span>
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="lesson-nav" id="lessonNav"></div>
      <div class="lesson-content" id="lessonContent"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">🎉</div>
  <div>
    <div id="toastTitle" style="font-family:'Righteous',cursive;font-size:0.95rem;"></div>
    <div id="toastMsg" style="font-size:0.78rem;color:#9ca3af;margin-top:2px;"></div>
  </div>
</div>

<script>
const modules = [

// ═══════════════════════════
// LEVEL 1 — MONEY FUNDAMENTALS
// ═══════════════════════════

{
  id:0, emoji:'💰', level:1, color:'#059669',
  title:'What Is Money For?',
  desc:'Discover the real purpose of money — it\'s a tool, not a goal.',
  xp:100,
  lessons:[
    {
      title:'Money Is a Tool',
      content:`
        <h3>What Would You Do Without Money?</h3>
        <p>Imagine you wanted to trade your drawing skills for a pizza. You'd have to find a pizza shop that specifically wanted a drawing right now. That's really hard! Money solves this problem by giving everyone a universal way to exchange value.</p>
        <p>Money is simply a <strong>tool for exchanging value</strong>. It's not magic — it's just an agreed-upon way for people to trade what they have for what they need.</p>
        <div class="info-box">💼 Key idea: Money itself isn't the goal. Money is a tool — just like a hammer helps you build things, money helps you get things done. The most successful entrepreneurs think of money as a score that shows how much value they've created for others.</div>
        <div class="fun-fact">Jeff Bezos started Amazon in his garage selling books. He didn't start with millions — he started with an idea to solve a problem. The money came after he created real value for customers.</div>
      `,
      quiz:{
        q:'What is money most accurately described as?',
        options:[
          {text:'The ultimate goal everyone should chase in life', correct:false},
          {text:'A universally agreed tool for exchanging value', correct:true},
          {text:'A government invention used to collect taxes', correct:false},
          {text:'A score that only banks and governments keep track of', correct:false}
        ],
        feedback:{ok:'Exactly! Money is a tool — a shared system that makes exchanging value between people much easier.'}
      }
    },
    {
      title:'Three Jobs of Money',
      content:`
        <h3>Money Wears Three Hats</h3>
        <p>Money isn't just for buying things. Economists say money does three important jobs — and understanding all three makes you smarter about how to use it.</p>
        <div class="vocab-box">
          <div class="vocab-title">💰 The Three Jobs of Money</div>
          <p><strong>1. Medium of Exchange:</strong> Makes buying and selling easy. Instead of trading apples for shoes, you use money everyone accepts.</p>
          <p><strong>2. Store of Value:</strong> Lets you save now and spend later. You can work today and use the money next year.</p>
          <p><strong>3. Unit of Account:</strong> Gives everything a price so we can compare values. Is a bike worth 10 pizzas or 50? Money makes this simple.</p>
        </div>
        <p>When you earn money doing chores, it's a medium of exchange. When you save it in a piggy bank, it's a store of value. When you compare prices at the store, you're using it as a unit of account.</p>
        <div class="fun-fact">Apple Inc. has so much cash stored that if you stacked the dollar bills, they'd reach the moon and back multiple times. Even mega-companies use money as a store of value!</div>
      `,
      quiz:{
        q:'Which job of money are you using when you save birthday cash to spend later?',
        options:[
          {text:'Medium of exchange — trading value between people', correct:false},
          {text:'Unit of account — comparing the prices of things', correct:false},
          {text:'Store of value — holding purchasing power for future use', correct:true},
          {text:'Unit of exchange — setting standard prices in markets', correct:false}
        ],

{
  id:9, emoji:'📊', level:2, color:'#6d28d9',
  title:'Price, Cost & Profit',
  desc:'The numbers that tell you if a business actually works.',
  xp:100,
  lessons:[
    {
      title:'The Profit Formula',
      content:`
        <h3>The Most Important Equation in Business</h3>
        <p>Every business comes down to one equation: <strong>Revenue − Costs = Profit</strong>. If profit is positive, the business is making money. If it's negative, the business is losing money. That's it.</p>
        <div class="vocab-box">
          <div class="vocab-title">💰 Key Business Numbers</div>
          <p><strong>Revenue:</strong> Total money coming IN from sales. (Price × Units sold)</p>
          <p><strong>Costs:</strong> Total money going OUT to run the business. (Materials + labor + rent + marketing)</p>
          <p><strong>Profit:</strong> What's LEFT after all costs. Revenue − Costs = Profit.</p>
          <p><strong>Profit Margin:</strong> Profit as a percentage of revenue. High margins = more efficient business.</p>
        </div>
        <div class="fun-fact">Apple has one of the highest profit margins of any company in history — around 25-30%. For every $100 of products sold, Apple keeps $25-30 as profit after all costs. Most businesses survive on much thinner margins (grocery stores average around 1-3%).</div>
      `,
      quiz:{
        q:'If a business earns $500 in revenue and has $320 in costs, what is the profit?',
        options:[
          {text:'$820 — the total when revenue and costs are added together', correct:false},
          {text:'$320 — the total amount spent on running all business operations', correct:false},
          {text:'$180 — what remains after all operating costs are subtracted', correct:true},
          {text:'$500 — the total gross amount earned from all sales combined', correct:false}
        ],
        feedback:{ok:'Correct! Profit = Revenue − Costs = $500 − $320 = $180. This is the fundamental equation every business must understand.'}
      }
    },
    {
      title:'Setting the Right Price',
      content:`
        <h3>Pricing Is a Superpower — Use It Wisely</h3>
        <p>Pricing is one of the most powerful — and most misunderstood — decisions in business. Set too low and you work hard but make little. Set too high and nobody buys. Getting it right requires understanding three approaches.</p>
        <div class="vocab-box">
          <div class="vocab-title">🏷️ Three Pricing Approaches</div>
          <p><strong>Cost-Plus:</strong> Calculate your costs, then add a profit margin. Simple but ignores what customers will actually pay.</p>
          <p><strong>Competitor-Based:</strong> Price similar to what competitors charge. Safe, but keeps you from standing out.</p>
          <p><strong>Value-Based:</strong> Price based on the VALUE customers receive, not your costs. Most powerful — used by luxury and software brands.</p>
        </div>
        <div class="info-box">💼 A $5 coffee from Starbucks costs maybe $0.50 to make. Starbucks uses value-based pricing — you're not paying for coffee, you're paying for the experience, the brand, the wifi, and the comfortable chair. Understanding this unlocks massive profit potential.</div>
      `,
      quiz:{
        q:'What makes value-based pricing the most powerful pricing strategy?',
        options:[
          {text:'It is by far the simplest and most accurate pricing method available', correct:false},
          {text:'It charges based on the value customers receive, not production cost', correct:true},
          {text:'It always guarantees your prices will beat every competitor out there', correct:false},
          {text:'It is a mandatory pricing rule for all luxury and premium products', correct:false}
        ],
        feedback:{ok:'Right! Value-based pricing captures what the product is actually worth to the customer — which is often far more than the cost to produce it. This creates higher profits and stronger positioning.'}
      }
    },
    {
      title:'Break-Even and Profit Goals',
      content:`
        <h3>When Does Your Business Actually Start Making Money?</h3>
        <p>Before a business makes profit, it must first <strong>break even</strong> — earn enough to cover all its costs. Every sale before break-even is just paying off the costs. Every sale after break-even is pure profit.</p>
        <div class="vocab-box">
          <div class="vocab-title">📐 Break-Even Calculation</div>
          <p><strong>Fixed Costs:</strong> Costs you pay regardless of sales. (Website, equipment, rent)</p>
          <p><strong>Variable Costs:</strong> Costs that change with each sale. (Materials, packaging)</p>
          <p><strong>Break-Even Point:</strong> Fixed Costs ÷ (Price − Variable Cost per unit)</p>
          <p><strong>Example:</strong> $200 fixed costs ÷ ($15 price − $5 variable) = 20 units to break even.</p>
        </div>
        <div class="challenge-box">
          <div class="challenge-title">🎯 Calculate Your Break-Even</div>
          <p>Pick a product you could sell. Estimate: What would your fixed costs be? What does each unit cost to make? What would you charge? Calculate how many units you need to sell before making any profit.</p>
        </div>
      `,
      quiz:{
        q:'What does it mean for a business to "break even"?',
        options:[
          {text:'The business is starting to become very profitable and growing fast', correct:false},
          {text:'The business earns exactly enough to cover all its costs with zero profit', correct:true},
          {text:'The business has an equal number of customers gaining and leaving', correct:false},
          {text:'The business has broken its previous revenue record for the month', correct:false}
        ],
        feedback:{ok:'Exactly! Break-even means revenue equals costs — no profit yet, but no loss either. Every unit sold beyond break-even generates real profit.'}
      },
      practice:{
        scenario:'You want to test whether your business idea could actually make money. Ask AI to help you build a simple profit calculator — input your costs, price, and expected sales to see whether the numbers work!',

        placeholder:'Try: "Help me build a simple profit model for this business: I plan to sell [product] for $[price]. My fixed costs are $[amount] and each unit costs $[amount] to make. Calculate my break-even point, monthly profit at [number] sales, and tell me if my pricing makes sense."'
      }
    }
  ]
},

// ──────────────────────────────────
//  STATE
// ──────────────────────────────────
const TOTAL_XP = 1800;
let state = { xp:0, completedLessons:{}, completedModules:{} };
try { const s = sessionStorage.getItem('keypr_biz'); if(s) state = JSON.parse(s); } catch(e){}
function saveState(){ try{ sessionStorage.setItem('keypr_biz', JSON.stringify(state)); }catch(e){} }
function updateXPBar(){
  const pct = Math.min((state.xp/TOTAL_XP)*100,100);
  document.getElementById('xpFill').style.width = pct+'%';
  document.getElementById('xpCount').textContent = state.xp+' / '+TOTAL_XP;
}

// ──────────────────────────────────
//  DASHBOARD
// ──────────────────────────────────
function renderDashboard(){
  const grids = {1:'gridL1', 2:'gridL2', 3:'gridL3'};
  Object.values(grids).forEach(id => document.getElementById(id).innerHTML='');
  modules.forEach((mod, idx) => {
    const totalL = mod.lessons.length;
    const doneL = mod.lessons.filter((_,li) => state.completedLessons[`${idx}-${li}`]).length;
    const pct = totalL ? (doneL/totalL)*100 : 0;
    const allDone = doneL === totalL;
    const card = document.createElement('div');
    card.className = 'module-card';
    card.style.setProperty('--accent', mod.color);
    card.style.animationDelay = (idx*0.06)+'s';
    card.innerHTML = `
      ${allDone ? '<div class="card-badge">✅</div>' : ''}
      <span class="card-emoji">${mod.emoji}</span>
      <div class="card-num">Module ${idx+1} · Level ${mod.level}</div>
      <div class="card-title">${mod.title}</div>
      <div class="card-desc">${mod.desc}</div>
      <div class="card-xp">💰 ${mod.xp} XP</div>
      <div class="card-progress"><div class="card-progress-fill" style="width:${pct}%"></div></div>
    `;
    card.onclick = () => openModal(idx);
    document.getElementById(grids[mod.level]).appendChild(card);
  });
  updateXPBar();
}

// ──────────────────────────────────
//  MODAL
// ──────────────────────────────────
let currentModule = 0, currentLesson = 0;

function openModal(modIdx){
  currentModule = modIdx; currentLesson = 0;
  const mod = modules[modIdx];
  document.getElementById('modalIcon').textContent = mod.emoji;
  document.getElementById('modalTitle').textContent = mod.title;
  renderLessonNav();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  renderDashboard();
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
});

function renderLessonNav(){
  const nav = document.getElementById('lessonNav');
  nav.innerHTML = '';
  modules[currentModule].lessons.forEach((les, li) => {
    const btn = document.createElement('button');
    btn.className = 'lesson-tab' + (li===currentLesson?' active':'') + (state.completedLessons[`${currentModule}-${li}`]?' done':'');
    btn.textContent = `${li+1}. ${les.title}`;
    btn.addEventListener('click', () => { currentLesson=li; renderLessonContent(); updateTabs(); });
    nav.appendChild(btn);
  });
  renderLessonContent();
}

function updateTabs(){
  document.getElementById('lessonNav').querySelectorAll('.lesson-tab').forEach((t,i) => {
    t.classList.toggle('active', i===currentLesson);
    t.classList.toggle('done', !!state.completedLessons[`${currentModule}-${i}`]);
  });
}

function renderLessonContent(){
  const mod = modules[currentModule];
  const lesson = mod.lessons[currentLesson];
  const key = `${currentModule}-${currentLesson}`;
  const done = !!state.completedLessons[key];
  let html = `<div class="lesson-panel">${lesson.content}`;

  if(lesson.quiz){
    const q = lesson.quiz;
    html += `<div class="quiz-block"><h3>🧩 Quick Check: ${q.q}</h3><div class="quiz-options">`;
    q.options.forEach((opt,oi) => {
      html += `<button class="quiz-opt${done&&opt.correct?' correct':''}" onclick="answerQuiz(${oi})" ${done?'disabled':''}>${opt.text}</button>`;
    });
    html += `</div><div class="quiz-feedback${done?' show ok':''}" id="quizFeedback">${done?'✅ '+q.feedback.ok:''}</div></div>`;
  }

  if(lesson.practice){
    const pr = lesson.practice;
    html += `<div class="prompt-practice"><h3>🎯 Try It: Prompt Engineering Practice!</h3><p><strong>Scenario:</strong> ${pr.scenario}</p><p><em>💡 Tip: ${pr.hint}</em></p><div class="prompt-input-wrap"><textarea class="prompt-textarea" id="practiceInput" placeholder="${pr.placeholder}"></textarea><button class="send-btn" onclick="scorePractice()">⬆</button></div><div class="ai-response-wrap" id="practiceResponse"><div class="ai-response" id="practiceText"></div><div class="prompt-score" id="practiceScore"></div></div></div>`;
  }

  if(!done){
    html += `<button class="complete-btn" onclick="completeLesson()">✅ Mark as Complete – Earn XP!</button>`;
  } else {
    const isLast = currentLesson === mod.lessons.length-1;
    const isLastMod = currentModule === modules.length-1;
    if(!isLast) html += `<button class="complete-btn" style="background:linear-gradient(135deg,#7c3aed,#5b21b6)" onclick="nextLesson()">➡️ Next Lesson</button>`;
    else if(!isLastMod) html += `<button class="complete-btn" style="background:linear-gradient(135deg,#0369a1,#0e7490)" onclick="closeModal()">🚀 Module Complete! Back to Dashboard</button>`;
    else html += `<button class="complete-btn" style="background:linear-gradient(135deg,#059669,#f59e0b)" onclick="closeModal()">🏆 Business Track Complete! You\'re an Entrepreneur!</button>`;
  }

  html += '</div>';
  document.getElementById('lessonContent').innerHTML = html;
}

function answerQuiz(oi){
  const q = modules[currentModule].lessons[currentLesson].quiz;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.disabled=true);
  const ok = q.options[oi].correct;
  opts[oi].classList.add(ok?'correct':'wrong');
  opts.forEach((o,i) => { if(q.options[i].correct) o.classList.add('correct'); });
  const fb = document.getElementById('quizFeedback');
  fb.classList.add('show', ok?'ok':'bad');
  fb.textContent = (ok?'✅ ':'❌ ') + q.feedback.ok;
}

function scorePractice(){
  const input = document.getElementById('practiceInput');
  const text = input.value.trim();
  if(!text) return;
  const responseEl = document.getElementById('practiceText');
  const scoreEl = document.getElementById('practiceScore');
  const wrap = document.getElementById('practiceResponse');
  responseEl.textContent = 'Evaluating your prompt... 💼';
  wrap.classList.add('show');
  let score = 0;
  const words = text.split(/\s+/).length;
  if(words >= 8) score += 25;
  if(words >= 15) score += 15;
  if(/explain|describe|create|write|help|build|design|analyze|compare|develop/i.test(text)) score += 20;
  if(/simple|clear|specific|example|real|practical|actionable|step/i.test(text)) score += 20;
  if(/age|year.old|kid|student|beginner|audience|format|list/i.test(text)) score += 20;
  const stars = score>=80?'⭐⭐⭐⭐⭐':score>=60?'⭐⭐⭐⭐':score>=40?'⭐⭐⭐':'⭐⭐';
  const feedback = score>=80?'Outstanding prompt! Specific, clear, and well-targeted. You think like an entrepreneur! 🚀'
    :score>=60?'Solid prompt! Try adding more context about the audience or asking for a specific format.'
    :score>=40?'Good start! Make it more specific — who is this for, and what exact output do you want?'
    :'Keep developing this prompt! Add detail: who is the audience, what format, how specific?';
  setTimeout(() => {
    responseEl.textContent = feedback;
    scoreEl.textContent = `${stars} Prompt Score: ${score}/100`;
  }, 600);
}

function nextLesson(){
  currentLesson++;
  renderLessonContent();
  updateTabs();
  document.getElementById('lessonContent').scrollTop = 0;
}

function completeLesson(){
  const key = `${currentModule}-${currentLesson}`;
  if(state.completedLessons[key]) return;
  state.completedLessons[key] = true;
  const xpEarned = Math.floor(modules[currentModule].xp / modules[currentModule].lessons.length);
  state.xp = Math.min(state.xp+xpEarned, TOTAL_XP);
  saveState();
  updateXPBar();
  showToast('💰','XP Earned!',`+${xpEarned} XP — great work!`);
  dropMoney();
  const mod = modules[currentModule];
  const allDone = mod.lessons.every((_,li) => state.completedLessons[`${currentModule}-${li}`]);
  if(allDone && !state.completedModules[currentModule]){
    state.completedModules[currentModule] = true;
    saveState();
    setTimeout(() => showToast('💼','Module Complete!',`${mod.title} — well done!`), 1200);
  }
  renderLessonContent();
  updateTabs();
}

let toastTimer;
function showToast(icon, title, msg){
  clearTimeout(toastTimer);
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

function dropMoney(){
  const rain = document.createElement('div');
  rain.className = 'money-rain';
  document.body.appendChild(rain);
  for(let i=0;i<18;i++){
    const drop = document.createElement('div');
    drop.className = 'money-drop';
    drop.textContent = ['💰','💵','💎','🏆','✨'][Math.floor(Math.random()*5)];
    drop.style.left = Math.random()*100+'vw';
    drop.style.animationDuration = (1.2+Math.random()*1.4)+'s';
    drop.style.animationDelay = (Math.random()*0.6)+'s';
    drop.style.fontSize = (1+Math.random()*1.1)+'rem';
    rain.appendChild(drop);
  }
  setTimeout(() => rain.remove(), 2500);
}
